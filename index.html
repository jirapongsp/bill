<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bill App Pro</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background: #f5f6fa; padding: 10px; }
.container { max-width: 500px; margin: auto; }
.card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 10px; }
input, button { width: 100%; padding: 12px; margin-top: 5px; font-size: 16px; border-radius: 8px; }
button { background: #3498db; color: white; border: none; }
.paid { background: #d4edda; }
.unpaid { background: #f8d7da; }
</style>

</head>

<body>
<div class="container">

<!-- LOGIN -->
<div id="loginPage">
    <div class="card">
        <h3>🔐 เข้าสู่ระบบ</h3>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <button onclick="register()">สมัคร</button>
    </div>
</div>

<!-- MAIN -->
<div id="mainPage" style="display:none;">

<div class="card">
    <button onclick="logout()">🚪 Logout</button>
</div>

<div class="card">
    <input id="name" placeholder="ชื่อ">
    <input id="numbers" placeholder="เลข เช่น 11 22 33">
    <input id="price" type="number" placeholder="ราคา/เลข">
    <button onclick="addPerson()">เพิ่ม</button>
</div>

<div class="card">
    <input id="search" placeholder="ค้นหา..." onkeyup="render()">
    <button onclick="showUnpaid()">🔴 ค้าง</button>
    <button onclick="sendToLine()">📤 LINE</button>
</div>

<div id="list"></div>

<!-- 🔥 เพิ่ม history จาก Supabase -->
<div class="card">
    <h3>📦 ประวัติ (Supabase)</h3>
    <div id="bill-list"></div>
</div>

</div>

<!-- UNPAID -->
<div id="unpaidPage" style="display:none;">
    <button onclick="back()">⬅️ กลับ</button>
    <div id="unpaidList"></div>
</div>

</div>

<script>

// 🔥 ใส่ของคุณ
const supabaseUrl = 'https://qrfwdlmdbdmbzaevpxks.supabase.co'
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyZndkbG1kYmRtYnphZXZweGtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzOTM1NjEsImV4cCI6MjA5MTk2OTU2MX0.sXOWtQinjLMS-Mw5k8i0o7AgFiQezjiC6UMzdT550n0'
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

// Firebase
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = null;
let data = [];

// AUTH
function register() {
    firebase.auth().createUserWithEmailAndPassword(email.value, password.value)
    .catch(e => alert(e.message));
}

function login() {
    firebase.auth().signInWithEmailAndPassword(email.value, password.value)
    .catch(e => alert(e.message));
}

function logout() {
    firebase.auth().signOut();
}

firebase.auth().onAuthStateChanged(u => {
    if (u) {
        user = u;
        loginPage.style.display = "none";
        mainPage.style.display = "block";

        db.ref("users/" + user.uid).on("value", snap => {
            data = snap.val() || [];
            render();
        });

        loadBills(); // 🔥 โหลด history

    } else {
        loginPage.style.display = "block";
        mainPage.style.display = "none";
    }
});

// DATA
function save() {
    db.ref("users/" + user.uid).set(data);
}

// 🔥 เพิ่ม Supabase ตอนเพิ่มข้อมูล
function addPerson() {
    let numbers = document.getElementById("numbers").value
        .split(/[\s,]+/)
        .filter(n => n);

    let total = numbers.length * price.value;

    const item = {
        name: name.value,
        numbers,
        price: price.value,
        total,
        paid: false
    };

    data.push(item);
    save();

    // 🔥 บันทึก Supabase
    saveBill(item);

    name.value = numbers.value = price.value = "";
}

// UI
function render() {
    list.innerHTML = "";

    data.forEach((p,i)=>{
        if(!p.name.includes(search.value)) return;

        let div = document.createElement("div");
        div.className = "card " + (p.paid ? "paid":"unpaid");

        div.innerHTML = `
        <b>${i+1}. ${p.name}</b><br>
        ${p.total} บาท<br>
        <button onclick="toggle(${i})">จ่าย</button>
        <button onclick="del(${i})">ลบ</button>
        `;

        list.appendChild(div);
    });
}

function toggle(i){
    data[i].paid = !data[i].paid;
    save();
}

function del(i){
    data.splice(i,1);
    save();
}

// UNPAID
function showUnpaid(){
    mainPage.style.display="none";
    unpaidPage.style.display="block";

    unpaidList.innerHTML="";

    data.filter(p=>!p.paid).forEach((p,i)=>{
        unpaidList.innerHTML += `${i+1}. ${p.name} - ${p.total}<br>`;
    });
}

function back(){
    mainPage.style.display="block";
    unpaidPage.style.display="none";
}

// 🔥 Supabase Save
async function saveBill(item) {
    try {
        await supabase.from('bills').insert([{
            name: item.name,
            amount: item.total,
            numbers: item.numbers.join(","),
            user_id: user.uid
        }]);
    } catch (e) {
        console.error("Supabase error", e);
    }
}

// 🔥 โหลด history
async function loadBills() {
    try {
        const { data, error } = await supabase
            .from('bills')
            .select('*')
            .eq('user_id', user.uid)
            .order('id', { ascending: false });

        if (error) throw error;

        const el = document.getElementById('bill-list');
        el.innerHTML = '';

        data.forEach(b => {
            el.innerHTML += `
                <div>${b.name} - ${b.amount} บาท</div>
            `;
        });

    } catch (e) {
        console.error(e);
    }
}

// LINE
function sendToLine(){
    let txt="🔴 ค้าง\n";
    data.filter(p=>!p.paid).forEach((p,i)=>{
        txt+=`${i+1}. ${p.name} ${p.total} บาท\n`;
    });
    window.open("https://line.me/R/msg/text/?"+encodeURIComponent(txt));
}

</script>

</body>
</html>
