<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bill App Pro</title>

<!-- Supabase -->
<script> src="https://unpkg.com/@supabase/supabase-js@2"

<style>
body { font-family: Arial; background: #f5f6fa; padding: 10px; }
.container { max-width: 500px; margin: auto; }
.card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 10px; }
input, button { width: 100%; padding: 12px; margin-top: 5px; font-size: 16px; border-radius: 8px; }
button { background: #3498db; color: white; border: none; }
.paid { background: #d4edda; }
.unpaid { background: #f8d7da; }
</style>

</head>

<body>
<div class="container">

<!-- LOGIN -->
<div id="loginPage">
    <div class="card">
        <h3>🔐 เข้าสู่ระบบ</h3>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <button onclick="register()">สมัคร</button>
    </div>
</div>

<!-- MAIN -->
<div id="mainPage" style="display:none;">

<div class="card">
    <button onclick="logout()">🚪 Logout</button>
</div>

<div class="card">
    <input id="name" placeholder="ชื่อ">
    <input id="numbers" placeholder="เลข เช่น 11 22 33">
    <input id="price" type="number" placeholder="ราคา/เลข">
    <button onclick="addPerson()">เพิ่ม</button>
</div>

<div class="card">
    <input id="search" placeholder="ค้นหา..." onkeyup="render()">
    <button onclick="showUnpaid()">🔴 ค้าง</button>
    <button onclick="sendToLine()">📤 LINE</button>
</div>

<div id="list"></div>

<div class="card">
    <h3>📦 ประวัติ</h3>
    <div id="bill-list"></div>
</div>

</div>

<!-- UNPAID -->
<div id="unpaidPage" style="display:none;">
    <button onclick="back()">⬅️ กลับ</button>
    <div id="unpaidList"></div>
</div>

</div>

<script>
if (window.supabaseClient) {
    console.warn("Supabase already exists");
} else {
    window.supabaseClient = window.supabase.createClient(
        'https://qrfwdlmdbdmbzaevpxks.supabase.co',
        'YOUR_ANON_KEY'
    );
}

const supabase = window.supabaseClient;

    
// 🔥 ใส่ของคุณจริง
const supabaseUrl = 'https://qrfwdlmdbdmbzaevpxks.supabase.co'
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyZndkbG1kYmRtYnphZXZweGtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzOTM1NjEsImV4cCI6MjA5MTk2OTU2MX0.sXOWtQinjLMS-Mw5k8i0o7AgFiQezjiC6UMzdT550n0'
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

let user = null;
let data = [];

// ================= AUTH =================
async function register() {
    const { data: res, error } = await supabase.auth.signUp({
        email: email.value,
        password: password.value
    });

    console.log("REGISTER:", res, error);

    if (error) {
        alert(error.message);
    } else {
        alert("สมัครสำเร็จ");
    }
}

async function login() {
    const { data: res, error } = await supabase.auth.signInWithPassword({
        email: email.value,
        password: password.value
    });

    console.log("LOGIN:", res, error);

    if (error) {
        alert(error.message);
    } else {
        alert("Login สำเร็จ");
        location.reload();
    }
}
    

async function logout() {
    await supabase.auth.signOut();
    location.reload();
}

// ตรวจ session
async function checkUser() {
    const { data } = await supabase.auth.getUser();

    if (data.user) {
        user = data.user;

        loginPage.style.display = "none";
        mainPage.style.display = "block";

        loadData();
        loadBills();

    } else {
        loginPage.style.display = "block";
        mainPage.style.display = "none";
    }
}

checkUser();

// ================= DATA =================

// โหลดรายการหลัก
async function loadData() {
    const { data: result } = await supabase
        .from('bills')
        .select('*')
        .eq('user_id', user.id);

    data = result || [];
    render();
}

// เพิ่มข้อมูล
async function addPerson() {
    let numbers = document.getElementById("numbers").value
        .split(/[\s,]+/)
        .filter(n => n);

    let total = numbers.length * price.value;

    const item = {
        name: name.value,
        numbers: numbers.join(","),
        amount: total,
        paid: false,
        user_id: user.id
    };

    await supabase.from('bills').insert([item]);

    name.value = numbers.value = price.value = "";

    loadData();
    loadBills();
}

// ================= UI =================
function render() {
    list.innerHTML = "";

    data.forEach((p,i)=>{
        if(!p.name.includes(search.value)) return;

        let div = document.createElement("div");
        div.className = "card " + (p.paid ? "paid":"unpaid");

        div.innerHTML = `
        <b>${i+1}. ${p.name}</b><br>
        ${p.amount} บาท<br>
        <button onclick="toggle(${p.id})">จ่าย</button>
        <button onclick="del(${p.id})">ลบ</button>
        `;

        list.appendChild(div);
    });
}

// update paid
async function toggle(id){
    const item = data.find(x => x.id === id);
    await supabase
        .from('bills')
        .update({ paid: !item.paid })
        .eq('id', id);

    loadData();
}

// delete
async function del(id){
    await supabase.from('bills').delete().eq('id', id);
    loadData();
}

// ================= HISTORY =================
async function loadBills() {
    const { data } = await supabase
        .from('bills')
        .select('*')
        .eq('user_id', user.id)
        .order('id', { ascending: false });

    const el = document.getElementById('bill-list');
    el.innerHTML = '';

    data.forEach(b => {
        el.innerHTML += `<div>${b.name} - ${b.amount} บาท</div>`;
    });
}

// ================= UNPAID =================
function showUnpaid(){
    mainPage.style.display="none";
    unpaidPage.style.display="block";

    unpaidList.innerHTML="";

    data.filter(p=>!p.paid).forEach((p,i)=>{
        unpaidList.innerHTML += `${i+1}. ${p.name} - ${p.amount}<br>`;
    });
}

function back(){
    mainPage.style.display="block";
    unpaidPage.style.display="none";
}

// LINE
function sendToLine(){
    let txt="🔴 ค้าง\n";
    data.filter(p=>!p.paid).forEach((p,i)=>{
        txt+=`${i+1}. ${p.name} ${p.amount} บาท\n`;
    });
    window.open("https://line.me/R/msg/text/?"+encodeURIComponent(txt));
}

</script>

</body>
</html>
